<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语作文素材搜集系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">文</span>
                    <div class="logo-text">
                        <h1>日语作文素材搜集系统</h1>
                        <p>自动抓取 · 统一管理 · 便捷导出</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-outline" id="refresh-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                        刷新数据
                    </button>
                    <button class="btn btn-primary" id="batch-export-btn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        导出选中 (<span id="selected-count">0</span>)
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-container">
            <!-- Search & Filter Bar -->
            <div class="filter-bar">
                <div class="search-box">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" id="search-input" placeholder="搜索作文标题、作者、内容...">
                </div>
                <div class="filter-group">
                    <select id="site-filter" class="filter-select">
                        <option value="">全部网站</option>
                    </select>
                    <select id="sort-select" class="filter-select">
                        <option value="time_desc">更新时间（最新）</option>
                        <option value="time_asc">更新时间（最早）</option>
                        <option value="title_asc">标题（A-Z）</option>
                        <option value="title_desc">标题（Z-A）</option>
                    </select>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <span class="stat-item">共 <strong id="total-count">0</strong> 篇作文</span>
                <span class="stat-separator">·</span>
                <span class="stat-item">来自 <strong id="site-count">0</strong> 个网站</span>
                <span class="stat-separator">·</span>
                <span class="stat-item" id="last-update">最后更新：--</span>
            </div>

            <!-- Essay List -->
            <div class="essay-list-container">
                <div class="list-header">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="select-all">
                        <span class="checkmark"></span>
                    </label>
                    <span class="header-label">全选</span>
                    <div class="header-actions-right">
                        <button class="btn-text" id="select-visible">选中当前页</button>
                        <button class="btn-text" id="clear-selection">清空选择</button>
                    </div>
                </div>

                <div id="essay-list" class="essay-list">
                    <!-- Empty State -->
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d6756b" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        </div>
                        <p class="empty-title">暂无作文数据</p>
                        <p class="empty-desc">点击右上角"刷新数据"开始抓取</p>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination-bar" id="pagination-bar">
                <div class="pagination-info">
                    显示 <span id="page-start">0</span>-<span id="page-end">0</span> 条，共 <span id="page-total">0</span> 条
                </div>
                <div class="pagination-controls">
                    <button class="page-btn" id="prev-page" disabled>上一页</button>
                    <div class="page-numbers" id="page-numbers"></div>
                    <button class="page-btn" id="next-page" disabled>下一页</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">作文预览</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="essay-meta">
                    <div class="meta-row">
                        <span class="meta-label">网站</span>
                        <span class="meta-value" id="modal-site"></span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">作者</span>
                        <span class="meta-value" id="modal-author"></span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">更新时间</span>
                        <span class="meta-value" id="modal-date"></span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">来源</span>
                        <a class="meta-link" id="modal-source" href="#" target="_blank"></a>
                    </div>
                </div>
                <div class="essay-body" id="modal-body"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="modal-close-btn">关闭</button>
                <button class="btn btn-primary" id="modal-export-btn">导出Word</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
