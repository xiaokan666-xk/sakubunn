<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语作文素材自动搜集系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>日语作文素材自动搜集系统</h1>
            <div class="stats">
                <span class="stat-item">总作文数: <strong id="total-count">0</strong></span>
            </div>
        </header>

        <div class="search-bar">
            <input type="text" id="keyword" placeholder="搜索关键词...">
            <select id="source-filter">
                <option value="">全部来源</option>
            </select>
            <button id="search-btn">搜索</button>
            <button id="crawl-btn">开始抓取</button>
        </div>

        <div class="essay-list">
            <table>
                <thead>
                    <tr>
                        <th>标题</th>
                        <th>来源</th>
                        <th>字数</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="essay-table-body">
                    <tr>
                        <td colspan="5" class="empty">暂无数据，请先执行抓取</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="prev-page" disabled>上一页</button>
            <span id="page-info">第 1 页</span>
            <button id="next-page" disabled>下一页</button>
        </div>
    </div>

    <div id="essay-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title"></h2>
            <div class="modal-info">
                <span>来源: <span id="modal-source"></span></span>
                <span>字数: <span id="modal-word-count"></span></span>
            </div>
            <div class="modal-content-text" id="modal-content"></div>
            <div class="modal-actions">
                <button id="export-btn">导出 Word</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
